<main class="auth-page">
  <section class="auth-card">
    <h1>Join</h1>
    <h2>Log in</h2>
    <form class="auth-form" onsubmit="handleLogin(event)" novalidate>
      <input id="loginEmail" type="email" placeholder="Email" />
      <input id="loginPassword" type="password" placeholder="Password" />
      <p class="form-message" id="loginMessage"></p>
      <button type="submit">Log in</button>
      <button type="button" onclick="handleGuestLogin()">Guest Log in</button>
    </form>
    <p>
      Not a Join user?
      <a href="?page=signup" data-page="signup">Sign up</a>
    </p>
  </section>
</main>
