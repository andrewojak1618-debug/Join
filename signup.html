<!DOCTYPE html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Join | Sign up</title>
    <link rel="stylesheet" href="./css/base.css" />
    <link rel="stylesheet" href="./css/molecules/buttons.css" />
    <link rel="stylesheet" href="./css/pages/login.css" />
    <script src="./js/shared.js" defer></script>
    <script src="./js/auth.js" defer></script>
  </head>
  <body>
    <main class="auth-page" id="app">
      <section class="auth-card">
        <a href="./index.html">Back</a>
        <h1>Join</h1>
        <h2>Sign up</h2>
        <form class="auth-form" id="signupForm" onsubmit="handleSignup(event)" novalidate>
          <input id="signupName" name="name" type="text" placeholder="Name" autocomplete="name" />
          <input id="signupEmail" name="email" type="email" placeholder="Email" autocomplete="email" />
          <input
            id="signupPassword"
            name="password"
            type="password"
            placeholder="Password"
            autocomplete="new-password"
          />
          <input
            id="signupConfirmPassword"
            name="confirmPassword"
            type="password"
            placeholder="Confirm Password"
            autocomplete="new-password"
          />
          <label class="privacy-check" for="privacyAccepted">
            <input
              id="privacyAccepted"
              name="privacyAccepted"
              type="checkbox"
              disabled
              aria-describedby="signupMessage"
            />
            I accept the
            <a id="privacyPolicyLink" href="./privacy-policy.html">Privacy Policy</a>
          </label>
          <p class="form-message" id="signupMessage"></p>
          <button id="signupButton" type="submit" disabled>Sign up</button>
        </form>
      </section>
    </main>
  </body>
</html>
